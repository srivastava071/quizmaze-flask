<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Play Quiz | QuizMaze</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/play.css') }}" />
</head>
<body>



   <header class="header-bar">
    <div class="logo-title">
      <a href="{{ url_for('home') }}" class="logo-link" aria-label="Go to Homepage">
      <img src="{{ url_for('static', filename='photos/logo.png') }}" alt="QuizMaze Logo" class="logo" />
      <h2>QuizMaze</h2>
      </a>
    </div>
    <nav>
      <ul>
        <li><a href="{{ url_for('home') }}">Home</a></li>
        <li><a href="{{ url_for('play') }}">Play</a></li>
        <li><a href="{{ url_for('create') }}">Create Quiz</a></li>
        <li><a href="{{ url_for('about') }}">About</a></li>
        {% if current_user.is_authenticated %}
  <li><span>👤 {{ current_user.username }}</span></li>
  <li><a href="{{ url_for('logout') }}">Logout</a></li>
{% else %}
  <li><a href="{{ url_for('login') }}">Login</a></li>
{% endif %}
      </ul>
    </nav>
  </header>

  <main>
    <div class="quiz-selector">
    <label for="quizType">Choose Quiz:</label>
    <select id="quizType">
      <option value="dsa">DSA Quiz</option>
      <option value="web">Web Quiz</option>
      <option value="custom">Your Custom Quiz</option>
    </select>

    <label for="quizDifficulty">Difficulty:</label>
    <select id="quizDifficulty">
      <option value="easy">Easy</option>
      <option value="medium">Medium</option>
      <option value="hard">Hard</option>
</select>

    <button onclick="startSelectedQuiz()">Start Quiz</button>
  </div>

  <section class="quiz-container">
    <div id="infoBar">
      <p><strong>Category:</strong> <span id="catName"></span></p>
      <p><strong>Difficulty:</strong> <span id="diffName"></span></p>
      <p id="timer">⏱ 10s</p>
    </div>
<div id="quizBox">
    <!-- Quiz question will load here -->
  </div>
</section>
<!-- Show Leaderboard Button -->
<button id="showLeaderboardBtn" class="leaderboard-button">🏆 Show Leaderboard</button>

<!-- Leaderboard Modal -->
<div id="leaderboardModal" class="leaderboard-modal">
  <div class="leaderboard-content">
    <span id="closeLeaderboard" class="close">&times;</span>
    <h2>🏆 Top 10 Players</h2>
    <ol id="leaderboardList"></ol>
   

  </div>
</div>


</section>
</main>

  <footer>
    <p>&copy; 2026 QuizMaze by Himanshu Srivastava</p>
  </footer>

  <script src="{{ url_for('static', filename='js/play.js') }}"></script>

  <script src="{{ url_for('static', filename='js/theme.js') }}"></script>

</body>
</html>
